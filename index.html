<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Ambition Box Job Analysis</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

</head>
<body style="
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background: url('https://images.unsplash.com/photo-1519389950473-47ba0277781c') no-repeat center center/cover;
">
<div style="
    position:absolute;
    width:100%;
    height:100%;
    background: rgba(0,0,0,0.5);
"></div>
<div class="card p-4" style="
    width:400px;
    background: rgba(255,255,255,0.15);
    backdrop-filter: blur(10px);
    border-radius:15px;
    color:white;
    position:relative;
">

<!-- <div class="container mt-5"></div> -->
    

        
        <h2 class="text-center mb-4" style = "font-weight:600"; letter-spacing:1px;>🔍 Job Analyzer</h2>

        <form method = "POST" action = "/submit">

            
            <div class="mb-3">
                <label class="form-label">Location</label>
                <select class="form-select form-select-sm mb-2" style = "border-radius:10px;" name="location">
                    <option value="">Select Location</option>
                    {% for loc in locations %}
                        <option value="{{ loc }}">{{ loc }}</option>
                    {% endfor %}
                </select>
            </div>

           
            <div class="mb-3">
                <label class="form-label">Industry</label>
                <select class="form-select form-select-sm mb-2"style="border-radius:10px;" name="companies">
                    <option value="">Select Industry</option>
                    {% for comp in companies %}
                        <option value="{{ comp }}">{{ comp }}</option>
                    {% endfor %}
                </select>
            </div>

           
            <div class="mb-3">
                <label class="form-label">Rating</label>
                <select class="form-select form-select-sm mb-2"style="border-radius:10px;" name="ratings">
                    <option value="">Select Rating</option>
                    {% for r in ratings %}
                        <option value="{{ r }}">{{ r }}</option>
                    {% endfor %}
                </select>
            </div>

<div class="mb-3">
    <label class="form-label">About</label>
    <select class="form-select"style="border-radius:10px;" name="abouts">
        <option value="">Select About</option>
        {% for a in abouts %}
            <option value="{{ a }}">{{ a }}</option>
        {% endfor %}
    </select>
</div>

<div class = "mb-3">
    <label class = "form-label">Select Output</label><br>
    <div class ="form-check form-check-inline">
        <input class = "form-check-input" type = "radio" name = "output" value = "table" checked>
        <label class = "form-check-label">Show Tables</label>
    </div>
<div class = "form-check form-check-inline">
<input class = "form-check-input" type = "radio" name = "output" value = "visual">
<label class = "form-check-label">Show Visualizations</label>
</div>
</div>
            <div class="text-center">
                <button type="submit" class="btn btn-primary w-50">Submit</button>
            </div>

        </form>


    </div>


</body>
</html>
